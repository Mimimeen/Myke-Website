<!DOCTYPE html>
<html>

<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bitcount:wght@100..900&family=Syne+Mono&display=swap');

        a:hover {

        }

        a {
            text-decoration: none;
        }

        body {
            margin: 0;

            height: 100vh;
            width: 100vh;

            text-align: center;
            display: flex;
            justify-content: center;

        .main-image {
            width: 500px;
            height: auto;

        }

        .title-card {

            background-color: #f9f9f9;
            border-radius: 10px;
        }


        .syne-mono-regular {
            font-family: "Syne Mono", monospace;
            font-weight: 400;
            font-style: normal;
        }


        .bitcount-regular {
            font-family: "Bitcount", system-ui;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings:
                "slnt" 0,
                "CRSV" 0.5,
                "ELSH" 0,
                "ELXP" 0;
        }

        .text-normal {
            color: black;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        }

            text-decoration: none;

        }

        .directory {
            position: absolute;
            top: 448px;
            left: 700px;
        }

        .dir-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-family: "Bitcount", system-ui;
            font-size: 1.1em;
            background-image: url("assets/halftone-artwork-2.jpg");
            background-size: cover;
            background-position-x: 15px;
            background-position-y: -9px
        }

        .dir-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-family: "Bitcount", system-ui;
        }

        .dir-item a:hover {
            background-image: url("Assets/halftone-artwork-hover.jpg");
            background-size: cover;
            transition: all 0.3 ease;

</head>
